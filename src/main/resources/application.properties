spring.application.name=despesas

# Configuração da URL e credenciais
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
#spring.jpa.hibernate.ddl-auto=update
# para acessar o banco quando está rodando
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Define quando os scripts SQL devem ser executados (sempre que o app subir)
spring.sql.init.mode=always

# Garante que o script SQL espere o Hibernate (se houver entidades)
spring.jpa.defer-datasource-initialization=true


